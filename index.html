<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infotech Grading System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

header{
text-align:center;
padding:25px;
font-size:28px;
font-weight:bold;
letter-spacing:1px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.container{
width:95%;
max-width:1200px;
margin:auto;
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:rgba(0,0,0,0.45);
border-radius:12px;
padding:25px;
box-shadow:0 8px 25px rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

.full{
grid-column:1/3;
}

h2{
margin-bottom:15px;
border-bottom:2px solid #00d2ff;
padding-bottom:8px;
}

label{
display:block;
margin-top:10px;
margin-bottom:5px;
font-size:14px;
}

input{
width:100%;
padding:10px;
border:none;
border-radius:6px;
margin-bottom:10px;
background:#1e2a38;
color:white;
}

input:focus{
outline:none;
border:1px solid #00d2ff;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
transition:0.3s;
}

.add{background:#28a745;color:white;}
.rename{background:#ffc107;color:black;}
.delete{background:#dc3545;color:white;}
.view{background:#007bff;color:white;}

button:hover{
opacity:0.85;
transform:scale(1.03);
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:#0e1724;
border-radius:8px;
overflow:hidden;
}

th{
background:#0a3d62;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #333;
text-align:center;
}

tr:hover{
background:#142033;
}

.grade-input{
width:70px;
text-align:center;
}

.resultBox{
margin-top:15px;
padding:15px;
background:#0e1724;
border-radius:8px;
line-height:1.8;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

.full{
grid-column:1;
}

}

</style>
</head>

<body>

<header>
Infotech Student Grading System
</header>

<div class="container">

<div class="card">

<h2>Student Information</h2>

<label>Student Name</label>
<input type="text" id="studentName">

<label>Section</label>
<input type="text" id="section">

</div>

<div class="card">

<h2>Subject Manager</h2>

<input type="text" id="newSubject" placeholder="Enter new subject">

<button class="add" onclick="addSubject()">Add Subject</button>
<button class="rename" onclick="renameSubject()">Rename Subject</button>
<button class="delete" onclick="deleteSubject()">Delete Subject</button>

</div>

<div class="card full">

<h2>Student Grades</h2>

<table>
<thead>
<tr>
<th>Category</th>
<th>Grade</th>
<th>Equivalent</th>
</tr>
</thead>

<tbody>
<tr>
<td>Quiz (20%)</td>
<td><input type="number" id="quiz" oninput="compute()"></td>
<td id="quizResult">0</td>
</tr>

<tr>
<td>Laboratory (30%)</td>
<td><input type="number" id="lab" oninput="compute()"></td>
<td id="labResult">0</td>
</tr>

<tr>
<td>Assignment (10%)</td>
<td><input type="number" id="assign" oninput="compute()"></td>
<td id="assignResult">0</td>
</tr>

<tr>
<td>Attendance (10%)</td>
<td><input type="number" id="attend" oninput="compute()"></td>
<td id="attendResult">0</td>
</tr>

<tr>
<td>Major Exam (30%)</td>
<td><input type="number" id="exam" oninput="compute()"></td>
<td id="examResult">0</td>
</tr>
</tbody>
</table>

<button class="view" onclick="viewGrades()">View Grades</button>

<div id="result" class="resultBox"></div>

</div>

</div>

<script>

let subjects=["Quiz (20%)","Laboratory (30)","Assignment (10%)","Attendance (10%)","Major Exam (30%)"];

function loadSubjects(){

let body=document.getElementById("gradeBody");
body.innerHTML="";

subjects.forEach((sub,index)=>{

let row=`
<tr>
<td>${sub}</td>
<td><input type="number" class="grade-input" id="grade${index}"></td>
</tr>
`;

body.innerHTML+=row;

});

}

function addSubject(){

let newSub=document.getElementById("newSubject").value.trim();

if(newSub==""){
alert("Enter subject name");
return;
}

subjects.push(newSub);
document.getElementById("newSubject").value="";
loadSubjects();

}

function renameSubject(){

let oldName=prompt("Enter subject name to rename");

let index=subjects.indexOf(oldName);

if(index==-1){
alert("Subject not found");
return;
}

let newName=prompt("Enter new subject name");

if(newName){
subjects[index]=newName;
loadSubjects();
}

}

function deleteSubject(){

let name=prompt("Enter subject name to delete");

let index=subjects.indexOf(name);

if(index==-1){
alert("Subject not found");
return;
}

subjects.splice(index,1);
loadSubjects();

}

function viewGrades(){

let name=document.getElementById("studentName").value;
let section=document.getElementById("section").value;

let quiz=parseFloat(document.getElementById("quiz").value) || 0;
let lab=parseFloat(document.getElementById("lab").value) || 0;
let assign=parseFloat(document.getElementById("assign").value) || 0;
let attend=parseFloat(document.getElementById("attend").value) || 0;
let exam=parseFloat(document.getElementById("exam").value) || 0;

// COMPUTATION
let finalGrade = 
(quiz * 0.20) +
(lab * 0.30) +
(assign * 0.10) +
(attend * 0.10) +
(exam * 0.30);

// OUTPUT
let result=`<h3>Student Record</h3>`;
result+=`Name: <b>${name}</b><br>`;
result+=`Section: <b>${section}</b><br><br>`;

result+=`Quiz: ${quiz}<br>`;
result+=`Laboratory: ${lab}<br>`;
result+=`Assignment: ${assign}<br>`;
result+=`Attendance: ${attend}<br>`;
result+=`Major Exam: ${exam}<br><br>`;

result+=`<h2>Final Grade: ${finalGrade.toFixed(2)}</h2>`;

document.getElementById("result").innerHTML=result;

}
  function compute(){

let quiz = parseFloat(document.getElementById("quiz").value) || 0;
let lab = parseFloat(document.getElementById("lab").value) || 0;
let assign = parseFloat(document.getElementById("assign").value) || 0;
let attend = parseFloat(document.getElementById("attend").value) || 0;
let exam = parseFloat(document.getElementById("exam").value) || 0;

// COMPUTE EACH PERCENTAGE
let quizRes = quiz * 0.20;
let labRes = lab * 0.30;
let assignRes = assign * 0.10;
let attendRes = attend * 0.10;
let examRes = exam * 0.30;

// DISPLAY EACH RESULT
document.getElementById("quizResult").innerText = quizRes.toFixed(2);
document.getElementById("labResult").innerText = labRes.toFixed(2);
document.getElementById("assignResult").innerText = assignRes.toFixed(2);
document.getElementById("attendResult").innerText = attendRes.toFixed(2);
document.getElementById("examResult").innerText = examRes.toFixed(2);

// TOTAL
let total = quizRes + labRes + assignRes + attendRes + examRes;

// SHOW FINAL GRADE
document.getElementById("result").innerHTML = 
"<h2>Final Grade: " + total.toFixed(2) + "</h2>";

}

loadSubjects();

</script>

</body>
</html>
